<nav class="nav" aria-label="Main navigation">
  <a class="nav-brand" routerLink="/about" [attr.aria-label]="appName + ' - About'">
    <div class="pulse-dot" aria-hidden="true"></div>
    <span class="brand-name">{{ appName }}</span>
  </a>

  <ul class="nav-links" role="list">
    <li>
      <a class="nav-link" routerLink="/server-management" routerLinkActive="nav-link--active" ariaCurrentWhenActive="page">
        Server
      </a>
    </li>
    <li>
      <a class="nav-link" routerLink="/monitor" routerLinkActive="nav-link--active" ariaCurrentWhenActive="page">
        All Server Dashboard
      </a>
    </li>
    <li>
      <a class="nav-link" routerLink="/alive" routerLinkActive="nav-link--active" ariaCurrentWhenActive="page">
        Alive
      </a>
    </li>
    <li>
      <a class="nav-link" routerLink="/db-monitor" routerLinkActive="nav-link--active" ariaCurrentWhenActive="page">
        Database
      </a>
    </li>
    @if (auth.isAdmin()) {
    <li>
      <a class="nav-link" routerLink="/server-config" routerLinkActive="nav-link--active" ariaCurrentWhenActive="page">
        Config
      </a>
    </li>
    }
  </ul>

  <button
    class="btn-theme"
    type="button"
    (click)="themeService.toggle()"
    [attr.aria-label]="themeService.isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
    [attr.title]="themeService.isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
    @if (themeService.isDark()) {
      <pk-icon name="sun" [size]="16" />
    } @else {
      <pk-icon name="moon" [size]="16" />
    }
  </button>
  <button class="btn-logout" type="button" (click)="logout()">Sign out</button>
</nav>

<div class="content">
  <router-outlet />
</div>
